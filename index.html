<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Holy Bible</title>
<script>
(function(){
  var s=JSON.parse(localStorage.getItem('bible_settings')||'{}');
  var theme=s.theme||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',theme);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Source+Serif+4:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f4;--surface:#fff;--surface-alt:#f3efe8;
  --accent:#8b4513;--accent-hover:#a0522d;
  --text:#2c2416;--muted:#7a6f60;--dim:#b0a898;
  --border:#e0d8cc;--highlight-bg:#fff3cd;--bookmark:#dc3545;
  --shadow:rgba(44,36,22,0.08);
  --font-size:18px;--font-body:'Source Serif 4',serif;--line-height:1.6;
  --radius:8px;--transition:0.2s ease;
}
[data-theme="dark"]{
  --bg:#1a1612;--surface:#252019;--surface-alt:#2e2820;
  --accent:#d4a056;--accent-hover:#e0b570;
  --text:#e8e0d4;--muted:#a09585;--dim:#6b6055;
  --border:#3d352c;--highlight-bg:#3d3520;--bookmark:#e74c3c;
  --shadow:rgba(0,0,0,0.3);
}
[data-theme="sepia"]{
  --bg:#f4ecd8;--surface:#faf5eb;--surface-alt:#efe8d8;
  --accent:#8b6914;--accent-hover:#a07d1e;
  --text:#5b4636;--muted:#8a7a68;--dim:#b0a494;
  --border:#d4c8b4;--highlight-bg:#e8dcc4;--bookmark:#c0392b;
  --shadow:rgba(91,70,54,0.08);
}
[data-theme="hc"]{
  --bg:#000;--surface:#000;--surface-alt:#111;
  --accent:#ffff00;--accent-hover:#ffe000;
  --text:#fff;--muted:#ccc;--dim:#999;
  --border:#fff;--highlight-bg:#333;--bookmark:#ff4444;
  --shadow:rgba(255,255,255,0.1);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:var(--font-size);line-height:var(--line-height);}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.skip-link{position:absolute;top:-40px;left:0;background:var(--accent);color:#fff;padding:8px 16px;z-index:9999;border-radius:0 0 var(--radius) 0;text-decoration:none;font-family:sans-serif;transition:top .2s}
.skip-link:focus{top:0}
/* App layout */
.app-layout{display:grid;grid-template-columns:280px 1fr 300px;height:100vh;overflow:hidden}
/* Sidebar */
#nav-sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-height:0}
#book-search-wrap{padding:12px;border-bottom:1px solid var(--border)}
#book-search,#overlay-book-search{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-alt);color:var(--text);font-size:14px;outline:none}
#book-search:focus,#overlay-book-search:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(139,69,19,0.15)}
#testament-tabs,#overlay-testament-tabs{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border)}
.testament-tab{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface-alt);color:var(--muted);font-size:12px;cursor:pointer;transition:var(--transition)}
.testament-tab.active,.testament-tab:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
#book-grid,#overlay-book-grid{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:2px;min-height:0}
.testament-section{margin-bottom:8px}
.testament-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);padding:4px 8px}
.book-btn{width:100%;text-align:left;padding:7px 10px;border:none;border-radius:5px;background:transparent;color:var(--text);cursor:pointer;font-size:13px;transition:var(--transition);font-family:var(--font-body)}
.book-btn:hover{background:var(--surface-alt)}
.book-btn.active{background:var(--accent);color:#fff}
.book-btn:focus{outline:2px solid var(--accent);outline-offset:1px}
/* Chapter grid */
#chapter-grid-wrap,#overlay-chapter-grid-wrap{padding:8px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;min-height:0}
#back-to-books,#overlay-back-to-books{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--accent);cursor:pointer;font-size:13px;text-align:left}
#chapter-grid,#overlay-chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:4px}
.chapter-btn{padding:8px 4px;border:1px solid var(--border);border-radius:5px;background:var(--surface-alt);color:var(--text);cursor:pointer;font-size:13px;text-align:center;transition:var(--transition)}
.chapter-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.chapter-btn.active{background:var(--accent);color:#fff;font-weight:600}
.chapter-btn.read{border-color:var(--accent);color:var(--accent)}
/* Main */
#main-content{display:flex;flex-direction:column;overflow:hidden;min-height:0;position:relative}
#reading-progress-bar{height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-hover));width:0;transition:width .2s;position:sticky;top:0;z-index:10}
/* Header */
#reading-header{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#hamburger-btn{display:none;padding:6px 10px;border:none;background:transparent;color:var(--text);cursor:pointer;font-size:18px;border-radius:var(--radius)}
#breadcrumb{display:flex;align-items:center;gap:4px;font-size:14px;color:var(--muted);flex:1;min-width:0}
.breadcrumb-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;font-family:var(--font-body);padding:2px 4px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.breadcrumb-btn:hover{background:var(--surface-alt)}
#header-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
#jump-input{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-alt);color:var(--text);font-size:13px;width:160px;outline:none}
#jump-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(139,69,19,0.15)}
#translation-btn,#search-btn,#settings-btn{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-alt);color:var(--text);cursor:pointer;font-size:13px;white-space:nowrap;transition:var(--transition)}
#translation-btn:hover,#search-btn:hover,#settings-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Reading pane */
#reading-pane,#home-screen,#search-panel{flex:1;overflow-y:auto;padding:32px 40px;max-width:760px;margin:0 auto;width:100%}
#chapter-heading{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:var(--accent);margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--border)}
#verse-container{display:flex;flex-direction:column;gap:0}
.verse{display:block;padding:4px 8px 4px 0;cursor:pointer;border-radius:4px;transition:background .15s;position:relative;line-height:var(--line-height);margin-bottom:2px}
.verse:hover{background:var(--surface-alt)}
.verse.selected{background:var(--highlight-bg) !important}
.verse.highlighted{border-radius:3px}
.verse-num{font-size:.7em;font-weight:700;color:var(--accent);margin-right:5px;vertical-align:super;font-family:'JetBrains Mono',monospace;user-select:none;min-width:20px;display:inline-block;text-align:right}
.verse-text{font-size:var(--font-size)}
.note-indicator{font-size:.7em;margin-left:4px;cursor:pointer;vertical-align:super}
#chapter-nav{display:flex;align-items:center;justify-content:space-between;padding:32px 0 16px;gap:12px;flex-wrap:wrap}
#prev-chapter,#next-chapter{padding:10px 20px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-alt);color:var(--text);cursor:pointer;font-size:14px;transition:var(--transition);font-family:var(--font-body)}
#prev-chapter:hover,#next-chapter:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
#prev-chapter:disabled,#next-chapter:disabled{opacity:.4;cursor:not-allowed}
#chapter-nav-label{font-size:14px;color:var(--muted)}
/* Skeleton */
.skeleton{animation:skeleton-pulse 1.5s ease-in-out infinite}
.skeleton-line{height:1em;background:var(--border);border-radius:4px;margin-bottom:12px}
@keyframes skeleton-pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Error state */
.error-state{text-align:center;padding:48px 16px}
.error-state h2{color:var(--text);margin-bottom:12px}
.error-state p{color:var(--muted);margin-bottom:20px}
.btn-primary{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px;font-family:var(--font-body);transition:var(--transition)}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{padding:8px 16px;background:var(--surface-alt);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:14px;font-family:var(--font-body);transition:var(--transition)}
.btn-secondary:hover{background:var(--border)}
.btn-sm{padding:5px 10px;font-size:12px;border:1px solid var(--border);border-radius:4px;background:var(--surface-alt);color:var(--text);cursor:pointer;transition:var(--transition)}
.btn-sm:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Right sidebar */
#right-sidebar{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-height:0}
#sidebar-tabs{display:flex;border-bottom:1px solid var(--border)}
#sidebar-tabs button{flex:1;padding:12px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:14px;border-bottom:2px solid transparent;transition:var(--transition);font-family:var(--font-body)}
#sidebar-tabs button[aria-selected="true"]{color:var(--accent);border-bottom-color:var(--accent)}
#bookmarks-panel,#plans-panel{flex:1;overflow-y:auto;padding:12px;min-height:0;display:flex;flex-direction:column;gap:8px}
#bookmark-actions{padding-top:8px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border);margin-top:auto;padding-top:12px}
.bookmark-item{padding:10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:var(--transition);position:relative}
.bookmark-item:hover{border-color:var(--accent);background:var(--surface-alt)}
.bookmark-ref{font-size:13px;font-weight:600;color:var(--accent)}
.bookmark-text{font-size:12px;color:var(--muted);margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bookmark-del{position:absolute;top:6px;right:6px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:3px}
.bookmark-del:hover{color:var(--bookmark);background:var(--surface-alt)}
.empty-state{text-align:center;color:var(--dim);padding:32px 16px;font-size:14px}
/* Plans */
.plan-card{border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:var(--transition)}
.plan-card:hover{border-color:var(--accent)}
.plan-card.active{border-color:var(--accent);background:var(--surface-alt)}
.plan-name{font-weight:600;font-size:14px;color:var(--text)}
.plan-desc{font-size:12px;color:var(--muted);margin-top:3px}
.plan-progress{margin-top:8px}
.plan-progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px}
.plan-progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.plan-progress-text{font-size:11px;color:var(--muted)}
.plan-today{margin-top:8px;font-size:12px;color:var(--accent);cursor:pointer}
/* Search */
#search-panel{padding:24px 32px}
.search-controls{margin-bottom:20px;display:flex;flex-direction:column;gap:10px}
.search-input-wrap{position:relative}
#search-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-alt);color:var(--text);font-size:16px;outline:none;font-family:var(--font-body)}
#search-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(139,69,19,0.15)}
.search-filters{display:flex;gap:8px}
#search-testament{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-alt);color:var(--text);font-size:13px;outline:none;cursor:pointer}
.search-result{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;transition:var(--transition)}
.search-result:hover{border-color:var(--accent);background:var(--surface-alt)}
.search-result-ref{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:4px}
.search-result-text{font-size:14px;color:var(--text);line-height:1.5}
.search-result-text mark{background:var(--highlight-bg);color:var(--text);border-radius:2px;padding:0 2px}
.search-count{font-size:13px;color:var(--muted);margin-bottom:12px}
.no-results{text-align:center;color:var(--dim);padding:32px;font-size:14px}
/* Home screen */
#home-screen{padding:32px 40px}
#votd-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;margin-bottom:24px;position:relative;overflow:hidden}
#votd-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent-hover))}
.votd-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:12px}
#votd-text{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--text);line-height:1.7;margin-bottom:12px;font-style:italic}
#votd-ref{font-size:14px;color:var(--accent);font-weight:600;display:block;margin-bottom:16px}
#votd-read-btn{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;transition:var(--transition);font-family:var(--font-body)}
#votd-read-btn:hover{background:var(--accent-hover)}
#today-plan{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px}
#recent-section h2{font-size:16px;font-weight:600;color:var(--text);margin-bottom:12px}
.recent-item{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:6px;transition:var(--transition)}
.recent-item:hover{border-color:var(--accent);background:var(--surface-alt)}
.recent-icon{font-size:18px}
.recent-ref{font-size:14px;font-weight:600;color:var(--text)}
.recent-time{font-size:11px;color:var(--dim);margin-left:auto}
/* Toast */
#toast{position:fixed;top:20px;right:20px;z-index:10000;padding:12px 20px;border-radius:var(--radius);background:var(--text);color:var(--bg);font-size:14px;font-family:sans-serif;max-width:320px;box-shadow:0 4px 20px var(--shadow);opacity:0;transform:translateY(-10px);transition:opacity .3s,transform .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.toast-warning{background:#e67e22}
#toast.toast-error{background:#c0392b}
#toast.toast-success{background:#27ae60}
/* Floating actions */
#floating-actions{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:8px 14px;box-shadow:0 4px 24px var(--shadow);flex-wrap:nowrap}
#floating-actions button{padding:6px 12px;border:none;border-radius:20px;background:transparent;color:var(--text);cursor:pointer;font-size:13px;white-space:nowrap;transition:var(--transition);font-family:sans-serif}
#floating-actions button:hover{background:var(--surface-alt)}
#fa-close{color:var(--dim);padding:4px 8px}
.fa-count{font-size:12px;color:var(--muted);font-family:sans-serif;padding-right:4px;border-right:1px solid var(--border);margin-right:2px}
.fa-highlight-wrap{position:relative}
#color-picker{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px;box-shadow:0 4px 16px var(--shadow)}
.color-swatch{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:transform .15s}
.color-swatch:hover{transform:scale(1.2);border-color:var(--text)}
/* Modals */
dialog{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;width:90%;box-shadow:0 8px 40px var(--shadow);max-height:80vh;overflow-y:auto}
dialog::backdrop{background:rgba(0,0,0,0.5)}
dialog h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--accent);margin-bottom:16px}
#translation-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.translation-option{padding:12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:var(--transition);display:flex;justify-content:space-between;align-items:center}
.translation-option:hover,.translation-option.active{border-color:var(--accent);background:var(--surface-alt)}
.translation-short{font-weight:700;color:var(--accent);font-size:14px}
.translation-name{font-size:13px;color:var(--muted)}
/* Settings */
#settings-content{display:flex;flex-direction:column;gap:20px;margin-bottom:16px}
.setting-group{display:flex;flex-direction:column;gap:8px}
.setting-label{font-size:13px;font-weight:600;color:var(--text)}
.setting-desc{font-size:12px;color:var(--muted)}
.theme-options{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.theme-btn{padding:10px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;text-align:center;font-size:13px;transition:var(--transition);background:var(--surface-alt)}
.theme-btn.active,.theme-btn:hover{border-color:var(--accent)}
.range-row{display:flex;align-items:center;gap:10px}
.range-row input[type=range]{flex:1;accent-color:var(--accent)}
.range-val{font-size:13px;color:var(--muted);min-width:36px;text-align:right;font-family:'JetBrains Mono',monospace}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle{position:relative;display:inline-block;width:40px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:11px;transition:.3s}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider::before{transform:translateX(18px)}
/* Note editor */
#note-editor{position:fixed;z-index:2000;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;max-width:320px;width:90%;box-shadow:0 4px 24px var(--shadow);top:50%;left:50%;transform:translate(-50%,-50%)}
#note-editor h3{margin-bottom:10px;font-size:15px;color:var(--text)}
#note-textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-alt);color:var(--text);font-size:14px;font-family:var(--font-body);resize:vertical;outline:none;margin-bottom:10px}
#note-textarea:focus{border-color:var(--accent)}
.note-actions{display:flex;gap:8px}
/* Mobile nav */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;background:var(--surface);border-top:1px solid var(--border);display:flex;height:60px}
#bottom-nav.active{display:flex}
.bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;padding:4px;transition:var(--transition)}
.bottom-nav-btn.active{color:var(--accent)}
.nav-icon{font-size:18px}
.nav-label{font-size:10px}
/* Nav overlay */
#nav-overlay{position:fixed;inset:0;z-index:900;display:flex}
#nav-overlay-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.5)}
#nav-overlay-content{position:relative;width:300px;background:var(--surface);height:100%;overflow-y:auto;display:flex;flex-direction:column;padding:0}
#close-nav-overlay{position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;color:var(--text);cursor:pointer;z-index:1;padding:4px 8px;border-radius:4px}
#close-nav-overlay:hover{background:var(--surface-alt)}
#overlay-book-search-wrap{padding:48px 12px 12px}
/* Install banner */
#install-banner{background:var(--accent);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:14px;font-family:sans-serif;flex-wrap:wrap}
#install-banner span{flex:1}
#install-btn{padding:5px 12px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:var(--radius);color:#fff;cursor:pointer;font-size:13px}
#dismiss-banner{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:18px;padding:0 4px;margin-left:auto}
/* Justify text option */
.justify-text .verse-text{text-align:justify}
/* Responsive */
@media(max-width:900px){
  .app-layout{grid-template-columns:240px 1fr}
  #right-sidebar{display:none}
}
@media(max-width:640px){
  .app-layout{grid-template-columns:1fr;height:calc(100vh - 60px)}
  #nav-sidebar{display:none}
  #hamburger-btn{display:block !important}
  #bottom-nav{display:flex}
  #reading-pane,#home-screen,#search-panel{padding:16px}
  #chapter-heading{font-size:1.4rem}
  #reading-header{padding:8px 12px;gap:6px}
  #jump-input{width:100px}
  #floating-actions{bottom:70px;padding:6px 10px}
  #floating-actions button{padding:5px 8px;font-size:12px}
}
@media print{
  #nav-sidebar,#right-sidebar,#reading-header,#chapter-nav,#bottom-nav,#floating-actions,#toast,#install-banner{display:none !important}
  .app-layout{display:block}
  #reading-pane{padding:0;max-width:100%;overflow:visible}
  .verse{page-break-inside:avoid}
}
/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}
/* Focus */
button:focus-visible,input:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.verse{animation:fadeIn .15s ease both}
#votd-card{animation:fadeIn .3s ease}
</style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to reading</a>
<div id="install-banner" hidden>
  <span>Install Holy Bible as an app for offline use</span>
  <button id="install-btn">Install</button>
  <button id="dismiss-banner" aria-label="Dismiss">×</button>
</div>
<div id="toast" role="alert" aria-live="assertive" aria-atomic="true"></div>
<div id="app" class="app-layout">
  <nav id="nav-sidebar" aria-label="Book navigation">
    <div id="book-search-wrap">
      <input id="book-search" type="search" placeholder="Search books…" autocomplete="off" aria-label="Search books">
    </div>
    <div id="testament-tabs" role="group" aria-label="Filter by testament">
      <button class="testament-tab active" data-testament="all">All</button>
      <button class="testament-tab" data-testament="OT">Old Testament</button>
      <button class="testament-tab" data-testament="NT">New Testament</button>
    </div>
    <div id="book-grid" role="listbox" aria-label="Books"></div>
    <div id="chapter-grid-wrap" hidden>
      <button id="back-to-books">← Books</button>
      <div id="chapter-grid" role="listbox" aria-label="Chapters"></div>
    </div>
  </nav>
  <main id="main-content" tabindex="-1">
    <div id="reading-progress-bar" role="progressbar" aria-label="Reading progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
    <header id="reading-header">
      <button id="hamburger-btn" aria-label="Open book navigation" aria-expanded="false" aria-controls="nav-overlay">☰</button>
      <nav id="breadcrumb" aria-label="Current location">
        <button id="breadcrumb-book" class="breadcrumb-btn" aria-label="Change book">Genesis</button>
        <span aria-hidden="true"> › </span>
        <button id="breadcrumb-chapter" class="breadcrumb-btn" aria-label="Change chapter">Chapter 1</button>
      </nav>
      <div id="header-actions">
        <input id="jump-input" type="text" placeholder="Jump to…" aria-label="Jump to reference" autocomplete="off">
        <button id="translation-btn" aria-label="Switch translation" aria-haspopup="dialog">NABRE</button>
        <button id="search-btn" aria-label="Open search">🔍</button>
        <button id="settings-btn" aria-label="Open settings">⚙</button>
      </div>
    </header>
    <div id="home-screen" hidden>
      <div id="votd-card">
        <div class="votd-label">✦ Verse of the Day</div>
        <blockquote id="votd-text"></blockquote>
        <cite id="votd-ref"></cite>
        <button id="votd-read-btn">Read Chapter →</button>
      </div>
      <div id="today-plan"></div>
      <div id="recent-section">
        <h2>Continue Reading</h2>
        <div id="recent-list"></div>
      </div>
    </div>
    <article id="reading-pane" aria-label="Bible text">
      <h1 id="chapter-heading" tabindex="-1"></h1>
      <div id="verse-container" role="list"></div>
      <nav id="chapter-nav" aria-label="Chapter navigation">
        <button id="prev-chapter" aria-label="Previous chapter">← Previous</button>
        <span id="chapter-nav-label"></span>
        <button id="next-chapter" aria-label="Next chapter">Next →</button>
      </nav>
    </article>
    <section id="search-panel" hidden aria-label="Search the Bible">
      <div class="search-controls">
        <div class="search-input-wrap">
          <input id="search-input" type="search" placeholder="Search the Bible…" aria-label="Search query" autocomplete="off">
        </div>
        <div class="search-filters">
          <select id="search-testament" aria-label="Filter results by testament">
            <option value="all">All Books</option>
            <option value="OT">Old Testament</option>
            <option value="NT">New Testament</option>
          </select>
        </div>
      </div>
      <div id="search-status" role="status" aria-live="polite" class="sr-only"></div>
      <div id="search-results" aria-label="Search results" aria-live="polite"></div>
    </section>
  </main>
  <aside id="right-sidebar" aria-label="Bookmarks and plans">
    <div id="sidebar-tabs" role="tablist">
      <button id="tab-bookmarks" role="tab" aria-selected="true" aria-controls="bookmarks-panel">Bookmarks</button>
      <button id="tab-plans" role="tab" aria-selected="false" aria-controls="plans-panel">Plans</button>
    </div>
    <div id="bookmarks-panel" role="tabpanel">
      <div id="bookmarks-list"></div>
      <div id="bookmark-actions">
        <button id="export-json" class="btn-sm">Export JSON</button>
        <button id="export-txt" class="btn-sm">Export Text</button>
      </div>
    </div>
    <div id="plans-panel" role="tabpanel" hidden>
      <div id="plans-list"></div>
    </div>
  </aside>
</div>
<nav id="bottom-nav" aria-label="Main navigation">
  <button data-panel="home" class="bottom-nav-btn active" aria-label="Home">
    <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
  </button>
  <button data-panel="reading" class="bottom-nav-btn" aria-label="Read">
    <span class="nav-icon">📖</span><span class="nav-label">Read</span>
  </button>
  <button data-panel="search" class="bottom-nav-btn" aria-label="Search">
    <span class="nav-icon">🔍</span><span class="nav-label">Search</span>
  </button>
  <button data-panel="bookmarks" class="bottom-nav-btn" aria-label="Bookmarks">
    <span class="nav-icon">🔖</span><span class="nav-label">Saved</span>
  </button>
  <button data-panel="settings" class="bottom-nav-btn" aria-label="Settings">
    <span class="nav-icon">⚙</span><span class="nav-label">Settings</span>
  </button>
</nav>
<dialog id="translation-modal" aria-label="Select Bible translation">
  <h2>Choose Translation</h2>
  <div id="translation-list" role="listbox" aria-label="Available translations"></div>
  <button id="close-translation-modal" class="btn-secondary">Close</button>
</dialog>
<dialog id="settings-modal" aria-label="App settings">
  <h2>Settings</h2>
  <div id="settings-content"></div>
  <button id="close-settings" class="btn-secondary">Close</button>
</dialog>
<div id="note-editor" hidden role="dialog" aria-modal="true" aria-label="Edit note">
  <h3>📝 Add Note</h3>
  <textarea id="note-textarea" rows="4" placeholder="Your note…" aria-label="Note text"></textarea>
  <div class="note-actions">
    <button id="save-note" class="btn-primary">Save</button>
    <button id="cancel-note" class="btn-secondary">Cancel</button>
  </div>
</div>
<div id="floating-actions" hidden role="toolbar" aria-label="Verse actions">
  <span id="fa-count" class="fa-count" aria-live="polite"></span>
  <button id="fa-copy" aria-label="Copy selected verses">📋 Copy</button>
  <button id="fa-bookmark" aria-label="Bookmark selected verses">🔖 Save</button>
  <div class="fa-highlight-wrap" style="position:relative">
    <button id="fa-highlight" aria-label="Highlight selected verses" aria-expanded="false">🖍 Color</button>
    <div id="color-picker" hidden role="group" aria-label="Highlight colors">
      <button class="color-swatch" data-color="#fff9c4" style="background:#fff9c4" aria-label="Yellow highlight" title="Yellow"></button>
      <button class="color-swatch" data-color="#c8e6c9" style="background:#c8e6c9" aria-label="Green highlight" title="Green"></button>
      <button class="color-swatch" data-color="#bbdefb" style="background:#bbdefb" aria-label="Blue highlight" title="Blue"></button>
      <button class="color-swatch" data-color="#f8bbd0" style="background:#f8bbd0" aria-label="Pink highlight" title="Pink"></button>
      <button class="color-swatch" data-color="#e1bee7" style="background:#e1bee7" aria-label="Purple highlight" title="Purple"></button>
      <button class="color-swatch" data-color="" style="background:var(--surface);font-size:10px;color:var(--text)" aria-label="Remove highlight" title="Remove">✕</button>
    </div>
  </div>
  <button id="fa-share" aria-label="Share selected verses">↗ Share</button>
  <button id="fa-note" aria-label="Add note to selected verses">📝 Note</button>
  <button id="fa-close" aria-label="Close verse toolbar" title="Clear selection">✕</button>
</div>
<div id="nav-overlay" hidden role="dialog" aria-modal="true" aria-label="Book navigation">
  <div id="nav-overlay-backdrop"></div>
  <div id="nav-overlay-content">
    <button id="close-nav-overlay" aria-label="Close navigation">✕</button>
    <div id="overlay-book-search-wrap">
      <input id="overlay-book-search" type="search" placeholder="Search books…" autocomplete="off" aria-label="Search books">
    </div>
    <div id="overlay-testament-tabs" role="group" aria-label="Filter by testament">
      <button class="testament-tab active" data-testament="all">All</button>
      <button class="testament-tab" data-testament="OT">OT</button>
      <button class="testament-tab" data-testament="NT">NT</button>
    </div>
    <div id="overlay-book-grid" role="listbox" aria-label="Books"></div>
    <div id="overlay-chapter-grid-wrap" hidden>
      <button id="overlay-back-to-books">← Books</button>
      <div id="overlay-chapter-grid" role="listbox" aria-label="Chapters"></div>
    </div>
  </div>
</div>
<div aria-live="polite" aria-atomic="true" class="sr-only" id="live-region"></div>
